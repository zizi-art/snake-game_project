<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃大蛇</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>🐍 贪吃大蛇</h1>

  <!-- Scoreboard + pause -->
  <div id="top-bar">
    <div id="scoreboard">
      <div class="score-cell">
        得分
        <span id="score">0</span>
      </div>
      <div class="score-cell">
        最高
        <span id="best" class="highlight">0</span>
      </div>
    </div>
    <button id="btn-pause" title="暂停 (P)">⏸</button>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <canvas id="canvas" width="400" height="400"></canvas>
  </div>

  <div id="message"><b>按空格键 / 点击屏幕</b> 开始游戏</div>

  <!-- D-pad for mobile -->
  <div id="controls">
    <button class="btn" id="btn-up">▲</button>
    <button class="btn" id="btn-left">◀</button>
    <button class="btn" id="btn-down">▼</button>
    <button class="btn" id="btn-right">▶</button>
  </div>

  <!-- Game Over overlay (DOM-based, clearly visible) -->
  <div id="overlay" class="hidden">
    <div class="overlay-card">
      <button id="btn-close-overlay" title="关闭">✕</button>
      <h2>GAME OVER</h2>
      <div class="overlay-stats">
        <div class="overlay-stat">
          <span class="label">本局得分</span>
          <span class="value" id="overlay-score">0</span>
        </div>
        <div class="overlay-stat">
          <span class="label">最高纪录</span>
          <span class="value green" id="overlay-best">0</span>
        </div>
      </div>
      <button id="btn-restart">再来一局</button>
      <span class="overlay-hint">���按空格键重新开始</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
